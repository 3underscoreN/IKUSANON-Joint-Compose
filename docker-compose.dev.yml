services:
  web:
    container_name: ikusanon-boostday-form-web-dev
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - '3000:3000'
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - webdb_network
      - webbot_network

  postgres:
    container_name: ikusanon-boostday-form-postgres-dev
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ikusanon_boostday_form_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    expose:
      - '5432'
    networks:
      - webdb_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ikusanon_boostday_form_dev} -h localhost',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    container_name: ikusanon-bot-dev
    build:
      context: ./apps/bot
      dockerfile: Dockerfile
    env_file: .env.dev
    restart: unless-stopped
    init: true
    volumes:
      - ./apps/bot/data:/app/data
    networks:
      - webbot_network
    depends_on:
      - web

networks:
  webdb_network:
    driver: bridge
    internal: true
  webbot_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

